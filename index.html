<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>One Quiet Minute</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght=200;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            width: 100%;
            height: 100%;
            max-height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
        }
        
        .intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 2.5s ease-in-out;
        }
        .intro h1 {
            color: #fff;
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: 5px;
            margin-bottom: 2rem;
            text-transform: uppercase;
            text-align: center;
            padding: 0 20px;
        }
        #begin-btn {
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            padding: 12px 40px;
            font-size: 1rem;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.4s ease;
            outline: none;
        }
        #begin-btn:hover {
            background-color: #fff;
            color: #000;
        }
        
        #space-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1;
            overflow: hidden;
        }
        
        .video-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            opacity: 0;
            z-index: 5;
            transition: opacity 2.5s ease-in-out; 
        }

        .overlay-msg {
            position: absolute;
            bottom: 30%; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            text-align: center;
            width: 90%;
            pointer-events: none;
        }
        
        .project-text {
            color: #fff;
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 2s ease-in-out; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        .project-text.show-text {
            opacity: 1;
        }
        
        .final-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .final-stack .line-1 {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 400;
            font-style: italic;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            line-height: 1.6;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        .final-stack .line-2 {
            color: #fff;
            font-size: 1.3rem;
            font-weight: 200;
            letter-spacing: 5px;
            margin-top: 5px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 2s ease-in-out 1s; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        .final-stack .line-1.show-text,
        .final-stack .line-2.show-text {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .intro h1 { font-size: 1.8rem; letter-spacing: 3px; }
            .project-text { font-size: 1.5rem; letter-spacing: 3px; }
            .final-stack .line-1 { font-size: 1.1rem; letter-spacing: 1px; width: 90%; margin: 0 auto; }
            .final-stack .line-2 { font-size: 1.1rem; letter-spacing: 3px; }
            .overlay-msg { bottom: 28%; }
        }
    </style>
</head>
<body>

    <div class="intro" id="intro-screen">
        <h1>One Quiet Minute</h1>
        <button id="begin-btn">Begin</button>
    </div>

    <div id="space-container">
        <video id="vid-galaxy" class="video-layer" src="assets/videos/space.mp4" muted playsinline webkit-playsinline preload="auto"></video>
        <video id="vid-stars" class="video-layer" src="assets/videos/star.mp4" muted playsinline webkit-playsinline preload="auto"></video>
        <video id="vid-earth" class="video-layer" src="assets/videos/earth.mp4" muted playsinline webkit-playsinline preload="auto"></video>
        <video id="vid-city" class="video-layer" src="assets/videos/city.mp4" muted playsinline webkit-playsinline preload="auto"></video>
        <video id="vid-sea" class="video-layer" src="assets/videos/sea.mp4" muted playsinline webkit-playsinline preload="auto"></video>

        <audio id="bg-music" src="assets/audio/music.mp3" preload="auto"></audio>

        <div class="overlay-msg" id="text-container"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const beginBtn = document.getElementById("begin-btn");
            const introScreen = document.getElementById("intro-screen");
            const textContainer = document.getElementById("text-container");
            const bgMusic = document.getElementById("bg-music");

            const vids = {
                galaxy: document.getElementById("vid-galaxy"),
                stars: document.getElementById("vid-stars"),
                earth: document.getElementById("vid-earth"),
                city: document.getElementById("vid-city"),
                sea: document.getElementById("vid-sea")
            };

            Object.values(vids).forEach(vid => {
                if (vid) {
                    vid.load();
                    vid.playbackRate = 0.55; 
                }
            });
            if (bgMusic) bgMusic.load();

            function changeText(htmlContent, delayTime = 1000) {
                textContainer.innerHTML = ""; 
                if (htmlContent === "") return;

                textContainer.innerHTML = htmlContent;

                setTimeout(() => {
                    const elements = textContainer.querySelectorAll(".project-text, .line-1, .line-2");
                    elements.forEach(el => el.classList.add("show-text"));
                }, delayTime);
            }

            function playScene(activeVid) {
                if (activeVid) {
                    activeVid.currentTime = 0;
                    activeVid.style.zIndex = "10";
                    activeVid.style.opacity = "1";
                    activeVid.playbackRate = 0.55; 
                    
                    activeVid.play().catch(err => console.log("Video play error:", err));
                    
                    setTimeout(() => {
                        Object.values(vids).forEach(vid => {
                            if (vid && vid !== activeVid) {
                                vid.style.opacity = "0";
                                vid.style.zIndex = "5";
                            }
                        });
                    }, 800);
                }
            }

            beginBtn.addEventListener("click", () => {
                introScreen.style.opacity = "0";
                setTimeout(() => introScreen.style.display = "none", 2000);

                if (bgMusic) {
                    bgMusic.play().catch(err => console.log("Audio error:", err));
                }

                playScene(vids.galaxy);
                changeText("");

                let galaxyTriggered = false;
                vids.galaxy.addEventListener("timeupdate", () => {
                    if (vids.galaxy.currentTime >= vids.galaxy.duration - 3 && !galaxyTriggered) {
                        galaxyTriggered = true;
                        playScene(vids.stars);
                        changeText("<p class='project-text'>One light</p>", 2000);
                    }
                });

                let starsTriggered = false;
                vids.stars.addEventListener("timeupdate", () => {
                    if (vids.stars.currentTime >= vids.stars.duration - 3 && !starsTriggered) {
                        starsTriggered = true;
                        playScene(vids.earth);
                        changeText("<p class='project-text'>One journey</p>", 2000);
                    }
                });

                let earthTriggered = false;
                vids.earth.addEventListener("timeupdate", () => {
                    if (vids.earth.currentTime >= vids.earth.duration - 3 && !earthTriggered) {
                        earthTriggered = true;
                        playScene(vids.city);
                        changeText("");
                    }
                });

                let cityTriggered = false;
                vids.city.addEventListener("timeupdate", () => {
                    if (vids.city.currentTime >= vids.city.duration - 3 && !cityTriggered) {
                        cityTriggered = true;
                        playScene(vids.sea);
                        changeText(`
                            <div class="final-stack">
                                <p class="line-1">Sometimes... silence says more than words</p>
                                <p class="line-2">13 July</p>
                            </div>
                        `, 2000);
                    }
                });

                vids.sea.onended = () => {
                    let fadeAudio = setInterval(() => {
                        if (bgMusic.volume > 0.1) {
                            bgMusic.volume -= 0.1;
                        } else {
                            clearInterval(fadeAudio);
                            bgMusic.pause();
                        }
                    }, 100);
                };
            });
        });
    </script>
</body>
</html>
