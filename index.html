<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-color=1.0, user-scalable=no, viewport-fit=cover">
    <title>One Quiet Minute</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght=200;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            width: 100%;
            height: 100%;
            max-height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
        }
        
        .intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999 !important;
            transition: opacity 1.5s ease-in-out;
        }
        .intro h1 {
            color: #fff;
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: 5px;
            margin-bottom: 2rem;
            text-transform: uppercase;
            text-align: center;
            padding: 0 20px;
        }
        #begin-btn {
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            padding: 12px 40px;
            font-size: 1rem;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.4s ease;
            outline: none;
        }
        #begin-btn:hover {
            background-color: #fff;
            color: #000;
        }
        
        #space-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1;
            overflow: hidden;
        }
        
        .video-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            opacity: 0;
            z-index: 5;
            transition: opacity 1.5s ease-in-out; 
        }

        #text-container {
            position: absolute;
            bottom: 35%; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999 !important;
            text-align: center;
            width: 90%;
            pointer-events: none;
        }
        
        .custom-text {
            color: #fff;
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0;
            display: none;
            transition: opacity 1.5s ease-in-out; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        
        .final-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .final-stack .line-1 {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 400;
            font-style: italic;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1.6;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        .final-stack .line-2 {
            color: #fff;
            font-size: 1.3rem;
            font-weight: 200;
            letter-spacing: 5px;
            margin-top: 5px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        @media (max-width: 768px) {
            .intro h1 { font-size: 1.8rem; letter-spacing: 3px; }
            .custom-text { font-size: 1.5rem; letter-spacing: 3px; }
            .final-stack .line-1 { font-size: 1.1rem; letter-spacing: 1px; width: 90%; margin: 0 auto; }
            .final-stack .line-2 { font-size: 1.1rem; letter-spacing: 3px; }
            #text-container { bottom: 32%; }
        }
    </style>
</head>
<body>

    <div class="intro" id="intro-screen">
        <h1>One Quiet Minute</h1>
        <button id="begin-btn">Begin</button>
    </div>

    <div id="space-container">
        <video id="vid-galaxy" class="video-layer" src="assets/videos/space.mp4" autoplay loop muted playsinline webkit-playsinline></video>
        <video id="vid-stars" class="video-layer" src="assets/videos/star.mp4" autoplay loop muted playsinline webkit-playsinline></video>
        <video id="vid-earth" class="video-layer" src="assets/videos/earth.mp4" autoplay loop muted playsinline webkit-playsinline></video>
        <video id="vid-city" class="video-layer" src="assets/videos/city.mp4" autoplay loop muted playsinline webkit-playsinline></video>
        <video id="vid-sea" class="video-layer" src="assets/videos/sea.mp4" autoplay loop muted playsinline webkit-playsinline></video>
    </div>

    <audio id="bg-music" src="assets/audio/music.mp3" loop></audio>

    <div id="text-container">
        <p id="txt1" class="custom-text">Look up...</p>
        <p id="txt2" class="custom-text">The universe is moving.</p>
        <p id="txt3" class="custom-text">And so are you.</p>
        <div id="txt4" class="custom-text final-stack">
            <p class="line-1">Sometimes... silence says more than words</p>
            <p class="line-2">13 July</p>
        </div>
    </div> 

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const beginBtn = document.getElementById("begin-btn");
            const introScreen = document.getElementById("intro-screen");
            const bgMusic = document.getElementById("bg-music");

            const vids = {
                galaxy: document.getElementById("vid-galaxy"),
                stars: document.getElementById("vid-stars"),
                earth: document.getElementById("vid-earth"),
                city: document.getElementById("vid-city"),
                sea: document.getElementById("vid-sea")
            };

            const txts = {
                1: document.getElementById("txt1"),
                2: document.getElementById("txt2"),
                3: document.getElementById("txt3"),
                4: document.getElementById("txt4")
            };

            // تهيئة الفيديوهات صامتة ومخفية لتعمل كخلفيات حقيقية
            Object.values(vids).forEach(vid => {
                if (vid) {
                    vid.muted = true;
                    vid.style.opacity = "0";
                    vid.style.zIndex = "1";
                    vid.playbackRate = 0.55; 
                    vid.play().catch(e => console.log("Prep play:", e));
                }
            });

            if (bgMusic) bgMusic.load();

            function showScene(activeVid, activeTxtId) {
                // إخفاء الفيديوهات القديمة بسلاسة
                Object.values(vids).forEach(vid => {
                    if (vid && vid !== activeVid) {
                        vid.style.opacity = "0";
                        vid.style.zIndex = "1";
                    }
                });

                // إخفاء كل النصوص
                Object.values(txts).forEach(txt => {
                    if (txt) {
                        txt.style.opacity = "0";
                        txt.style.display = "none";
                    }
                });

                // تشغيل وإظهار الفيديو النشط
                if (activeVid) {
                    activeVid.style.zIndex = "10";
                    activeVid.style.opacity = "1";
                    activeVid.muted = true;
                    activeVid.playbackRate = 0.55;
                    activeVid.play().catch(err => console.log(err));
                }

                // إظهار النص المطلوب فوق كل شيء بنعومة
                if (activeTxtId && txts[activeTxtId]) {
                    txts[activeTxtId].style.display = activeTxtId === 4 ? "flex" : "block";
                    setTimeout(() => {
                        txts[activeTxtId].style.opacity = "1";
                    }, 100);
                }
            }

            beginBtn.addEventListener("click", () => {
                introScreen.style.opacity = "0";
                setTimeout(() => introScreen.style.display = "none", 1500);

                if (bgMusic) {
                    bgMusic.muted = false;
                    bgMusic.volume = 1.0;
                    bgMusic.play().catch(err => console.log("Audio play error:", err));
                }

                // تسلسل زمني دقيق ومضمون يتخطى قيود متصفح الآيفون
                // المشهد 1: المجرة
                showScene(vids.galaxy, 1);

                // المشهد 2: النجوم (بعد 6 ثوانٍ)
                setTimeout(() => {
                    showScene(vids.stars, 2);
                }, 6000);

                // المشهد 3: الأرض (بعد 12 ثانية)
                setTimeout(() => {
                    showScene(vids.earth, 3);
                }, 12000);

                // المشهد 4: المدينة بدون نص (بعد 18 ثانية)
                setTimeout(() => {
                    showScene(vids.city, null);
                }, 18000);

                // المشهد 5: البحر والنص النهائي (بعد 24 ثانية)
                setTimeout(() => {
                    showScene(vids.sea, 4);
                }, 24000);
            });
        });
    </script>
</body>
</html>
